<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>AutoSlides Share</title>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2f3437;
        --muted: #787c80;
        --border: #eceae6;
      }
      @media (prefers-color-scheme: dark) {
        :root { --bg: #191919; --text: #e9e9e7; --muted: #9b9a97; --border: #2f2f2f; }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 32px;
      }
      main { max-width: 420px; text-align: center; }
      h1 { margin: 0 0 8px; font-size: 22px; font-weight: 700; }
      p { margin: 0; color: var(--muted); font-size: 15px; line-height: 1.6; }
    </style>
  </head>
  <body>
    <main>
      <h1>AutoSlides Share</h1>
      <p>Open a share link to view the slides. Links are created from the AutoSlides app.</p>
    </main>
  </body>
</html>
